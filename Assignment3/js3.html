<!DOCTYPE html>
<html>
<head>
    <title>JS Assignment 3</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        .card {
            background-color: white;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
        }

        .card h2 {
            margin-bottom: 10px;
            color: #003366;
        }

        .result {
            font-size: 18px;   /* Increased text size */
            font-weight: bold;
            background-color: #e6f0ff;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h1>JavaScript Assignment 3</h1>

<div id="container"></div>

<script>

const container = document.getElementById("container");

function createCard(title, content) {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<h2>${title}</h2>
                      <div class="result">${content}</div>`;
    container.appendChild(card);
}

/* Q1 */
let states = ["Assam","Bihar","Odisha","Uttar Pradesh","Karnataka","Maharashtra","Andhra Pradesh"];
let filteredStates = states.filter(state => 
    !["A","E","I","O","U"].includes(state[0])
);
createCard("Q1: Remove states starting with vowels",
    filteredStates.join(", ")
);

/* Q2 */
let str = "I love my India";
createCard("Q2: Reverse Sentence",
    str.split(" ").reverse().join(" ")
);

/* Q3 */
let arr = "INDIA".split("");
arr.splice(3,0,"O","N","E","S");
createCard("Q3: INDIA → INDONESIA",
    arr.join("")
);

/* Q4 */
let longString = "JavaScript is very powerful language";
let vowels = 0, consonants = 0;

for (let char of longString.toLowerCase()) {
    if (/[aeiou]/.test(char)) vowels++;
    else if (/[a-z]/.test(char)) consonants++;
}
createCard("Q4: Count Vowels & Consonants",
    "Vowels: " + vowels + " | Consonants: " + consonants
);

/* Q5 */
function correctfn(sentence, wrong, correct) {
    return sentence.replace(wrong, correct);
}
createCard("Q5: Replace Wrong Word",
    correctfn("I luv JavaScript", "luv", "love")
);

/* Q6 */
let inputArr = [1,2,3,9,10,7,5,4,3];
createCard("Q6: Numbers Greater Than 5",
    inputArr.filter(num => num > 5).join(", ")
);

/* Q7 */
const students = [
{ name: "Ram", scores: [80, 70, 60] },
{ name: "Mohan", scores: [80, 70, 90] },
{ name: "Sai", scores: [60, 70, 80] },
{ name: "Hemang", scores: [90, 90, 80, 80] },
];

let averages = students.map(student => {
    let total = student.scores.reduce((sum, score) => sum + score, 0);
    return student.name + ": " + (total / student.scores.length);
});

createCard("Q7: Students Average",
    averages.join(" | ")
);

/* Q8 */
function repeatedDigitSum(num) {
    while (num >= 10) {
        num = num.toString().split("")
            .reduce((sum, digit) => sum + Number(digit), 0);
    }
    return num;
}
createCard("Q8: Repeated Digit Sum (456)",
    repeatedDigitSum(456)
);

/* Q9 */
function wordCount(paragraph) {
    return paragraph.trim().split(/\s+/).length;
}
createCard("Q9: Word Count",
    wordCount("JavaScript is used for web development and application building.")
);

/* Q10 */
function reverseString(str) {
    return str.split("").reverse().join("");
}
createCard("Q10: Reverse String (Hello)",
    reverseString("Hello")
);

/* Q11 */
let studentsData = {
    student1: {subject1:44,subject2:56,subject3:87,subject4:97,subject5:37},
    student2: {subject1:44,subject2:56,subject3:87,subject4:97,subject5:37},
    student3: {subject1:44,subject2:56,subject3:87,subject4:97,subject5:37}
};

let result = {};

for (let key in studentsData) {
    let scores = Object.values(studentsData[key]);
    let total = scores.reduce((sum, val) => sum + val, 0);
    result[key] = { average: total / scores.length };
}

createCard("Q11: Students Average from Object",
    JSON.stringify(result)
);

</script>

</body>
</html>
